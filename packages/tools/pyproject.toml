[tool.coverage.run]
branch = true
source = [ "adr_agent_tools" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/packages/tools/html'
 --cov-report xml:'../../coverage/packages/tools/coverage.xml'
 --html='../../reports/packages/tools/unittests/html/index.html'
 --junitxml='../../reports/packages/tools/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "adr_agent_tools" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 99
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "adr_agent.tools"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "mcp~=1.13.0",
  "boto3~=1.40.14",
  "aws-opentelemetry-distro~=0.11.0"
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"
